<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Whodini - Coming Soon</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&display=swap"
    />
    <style>
      :root {
        --primary-pink: #ff4d6d;
        --glass-white: rgba(255, 255, 255, 0.15);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: radial-gradient(
          circle at top left,
          #ff8e8e,
          #d83a5a,
          #4a0e2a
        );
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: "Outfit", sans-serif;
        color: white;
        padding: 24px;
        text-align: center;
      }

      /* ---- Interlocking rings animation ---- */
      .logo-rings {
        position: relative;
        width: 100px;
        height: 60px;
        margin-bottom: 32px;
      }

      .ring {
        position: absolute;
        width: 50px;
        height: 50px;
        border: 8px solid rgba(255, 255, 255, 0.2);
        border-top: 8px solid white;
        border-radius: 50%;
        animation: spin 1.5s linear infinite;
      }

      .ring-left {
        left: 0;
        box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.5);
      }

      .ring-right {
        right: 0;
        animation-direction: reverse;
        border-top-color: var(--primary-pink);
      }

      /* ---- Content ---- */
      .brand {
        font-size: 3rem;
        font-weight: 600;
        letter-spacing: -1px;
        margin-bottom: 6px;
      }

      .tagline {
        font-weight: 300;
        opacity: 0.85;
        margin-bottom: 48px;
        font-size: 1.05rem;
      }

      /* Glass card */
      .maintenance-card {
        background: var(--glass-white);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 28px;
        padding: 48px 36px;
        max-width: 480px;
        width: 100%;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
        animation: fadeUp 0.8s ease forwards;
      }

      .wrench-icon {
        font-size: 2.5rem;
        margin-bottom: 16px;
        display: block;
        animation: wiggle 2s ease-in-out infinite;
      }

      .maintenance-card h2 {
        font-size: 1.6rem;
        font-weight: 600;
        margin-bottom: 12px;
        letter-spacing: -0.02em;
      }

      .maintenance-card p {
        font-weight: 300;
        font-size: 1rem;
        line-height: 1.6;
        opacity: 0.9;
        margin-bottom: 8px;
      }

      .maintenance-card p:last-child {
        margin-bottom: 0;
      }

      .divider {
        width: 48px;
        height: 3px;
        background: var(--primary-pink);
        border-radius: 3px;
        margin: 20px auto;
        opacity: 0.8;
      }

      .contact-link {
        color: white;
        font-weight: 600;
        text-decoration: underline;
        text-underline-offset: 4px;
        transition: opacity 0.2s ease;
      }

      .contact-link:hover {
        opacity: 0.8;
      }

      /* ---- Footer ---- */
      .footer {
        margin-top: 40px;
        font-weight: 300;
        font-size: 0.85rem;
        opacity: 0.6;
      }

      /* ---- Animations ---- */
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes wiggle {
        0%,
        100% {
          transform: rotate(0deg);
        }
        25% {
          transform: rotate(12deg);
        }
        75% {
          transform: rotate(-12deg);
        }
      }

      /* ---- Responsive ---- */
      @media (max-width: 479px) {
        .brand {
          font-size: 2.2rem;
        }
        .tagline {
          font-size: 0.9rem;
          margin-bottom: 32px;
        }
        .maintenance-card {
          padding: 32px 24px;
          border-radius: 22px;
        }
        .maintenance-card h2 {
          font-size: 1.3rem;
        }
        .maintenance-card p {
          font-size: 0.9rem;
        }
      }
    </style>
  </head>

  <body>
    <h1 class="brand">Whodini</h1>
    <p class="tagline">Your Digital Identity Platform</p>

    <div class="logo-rings">
      <div class="ring ring-left"></div>
      <div class="ring ring-right"></div>
    </div>

    <div class="maintenance-card">
      <span class="wrench-icon">�</span>
      <h2>Coming Soon</h2>
      <p>
        Something exciting is on the way. We're building a new experience for
        you and will be launching shortly.
      </p>
      <div class="divider"></div>
    </div>

    <p class="footer">&copy; 2026 Whodini. All rights reserved.</p>
  </body>
</html>
